<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Baseball Spotify Walk-Up Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 24px;
      margin: 0;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 10px 0;
    }

    h2 {
      font-size: 28px;
      color: #facc15;
      margin-top: 30px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin: 20px 0;
    }

    button {
      font-size: 22px;
      font-weight: bold;
      padding: 18px 22px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }

    button:hover {
      filter: brightness(1.1);
    }

    .login {
      background: #2563eb;
    }

    .pause {
      background: #dc2626;
    }

    .clear {
      background: #6b7280;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .player-button {
      background: #16a34a;
      min-height: 130px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .player-name {
      font-size: 26px;
      line-height: 1.1;
    }

    .song-title {
      font-size: 17px;
      font-weight: normal;
      color: #e5e7eb;
      line-height: 1.2;
    }

    .start-time {
      font-size: 16px;
      color: #bbf7d0;
    }

    #status {
      margin-top: 20px;
      font-size: 22px;
      color: #d1d5db;
      white-space: pre-wrap;
      line-height: 1.4;
      background: #1f2937;
      padding: 16px;
      border-radius: 14px;
    }

    .note {
      color: #9ca3af;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>⚾ Baseball Spotify Walk-Up Board</h1>

  <div class="note">
    Open Spotify first, play any song for a second, then pause it. That makes the device active.
  </div>

  <div class="top-bar">
    <button class="login" onclick="login()">Login to Spotify</button>
    <button class="pause" onclick="pauseSpotify()">Pause</button>
    <button class="clear" onclick="clearCachedTracks()">Clear Cached Tracks</button>
  </div>

  <div id="status">Status: Not logged in</div>

  <h2>Walk-Up Songs</h2>
  <div id="playerButtons" class="player-grid"></div>

<script>
const clientId = "847557a6ec1343978c41d7122e8381fe";
const redirectUri = "https://bshafer-unorth.github.io/baseball-soundboard/";

const scopes = [
  "user-read-playback-state",
  "user-modify-playback-state"
];

const walkupSongs = [

    query: "Trophies Drake",

  },
  {

  },
  {

  },
  {
    name: "Aiden Emkow",
    song: "Lights Come On",

  },
  {
    name: "Boston Westafer",

  {

  },
  {
    name: "Hunter Singleton",
    song: "Swag Surfin'",
    artist: "F.L.Y.",

    name: "Maddux Holloway",

    name: "Owen Holbrook",

  }
];

function setStatus(message) {
  document.getElementById("status").textContent = "Status: " + message;
}

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return minutes + ":" + String(seconds).padStart(2, "0");
}

function renderButtons() {
  const container = document.getElementById("playerButtons");
  container.innerHTML = "";

  walkupSongs.forEach((item, index) => {
    const button = document.createElement("button");
    button.className = "player-button";
    button.onclick = () => playWalkup(index);

    button.innerHTML = `
      <div class="player-name">${item.name}</div>
      <div class="song-title">${item.song} - ${item.artist}</div>
      <div class="start-time">Starts at ${formatTime(item.startMs)}</div>
    `;

    container.appendChild(button);
  });
}

function randomString(length) {
  const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let text = "";

  for (let i = 0; i < length; i++) {
    text += possible.charAt(Math.floor(Math.random() * possible.length));
  }

  return text;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return window.crypto.subtle.digest("SHA-256", data);
}

function base64UrlEncode(arrayBuffer) {
  return btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

async function login() {
  const codeVerifier = randomString(64);
  localStorage.setItem("spotify_code_verifier", codeVerifier);

  const hashed = await sha256(codeVerifier);
  const codeChallenge = base64UrlEncode(hashed);

  const authUrl = new URL("https://accounts.spotify.com/authorize");

  authUrl.searchParams.append("response_type", "code");
  authUrl.searchParams.append("client_id", clientId);
  authUrl.searchParams.append("scope", scopes.join(" "));
  authUrl.searchParams.append("redirect_uri", redirectUri);
  authUrl.searchParams.append("code_challenge_method", "S256");
  authUrl.searchParams.append("code_challenge", codeChallenge);

  window.location = authUrl.toString();
}

async function handleCallback() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");

  if (!code) return;

  const codeVerifier = localStorage.getItem("spotify_code_verifier");

  const body = new URLSearchParams();
  body.append("client_id", clientId);
  body.append("grant_type", "authorization_code");
  body.append("code", code);
  body.append("redirect_uri", redirectUri);
  body.append("code_verifier", codeVerifier);

  const response = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: body
  });

  const data = await response.json();

  if (data.access_token) {
    localStorage.setItem("spotify_access_token", data.access_token);

    setStatus(
      "Logged in.\n\n" +
      "Open Spotify, play any song for a second, pause it, then press a player button."
    );

    window.history.replaceState({}, document.title, "/spotify-test.html");
  } else {
    setStatus("Login failed:\n" + JSON.stringify(data, null, 2));
  }
}

function getToken() {
  return localStorage.getItem("spotify_access_token");
}

function getCacheKey(item) {
  return "spotify_track_" + item.name.replace(/\s+/g, "_");
}

async function searchSpotifyTrack(item) {
  const token = getToken();

  const cacheKey = getCacheKey(item);
  const cachedTrackId = localStorage.getItem(cacheKey);

  if (cachedTrackId) {
    return cachedTrackId;
  }

  setStatus("Searching Spotify for:\n" + item.query);

  const searchUrl = new URL("https://api.spotify.com/v1/search");
  searchUrl.searchParams.append("q", item.query);
  searchUrl.searchParams.append("type", "track");
  searchUrl.searchParams.append("limit", "1");

  const response = await fetch(searchUrl.toString(), {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await response.json();

  if (!response.ok) {
    throw new Error("Spotify search failed. HTTP " + response.status + ":\n" + JSON.stringify(data, null, 2));
  }

  if (!data.tracks || !data.tracks.items || data.tracks.items.length === 0) {
    throw new Error("No Spotify track found for: " + item.query);
  }

  const track = data.tracks.items[0];
  localStorage.setItem(cacheKey, track.id);

  setStatus(
    "Found Spotify track:\n" +
    track.name + " - " + track.artists.map(a => a.name).join(", ")
  );

  return track.id;
}

async function playSpotifyTrack(trackId, item) {
  const token = getToken();

  const response = await fetch("https://api.spotify.com/v1/me/player/play", {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      uris: ["spotify:track:" + trackId],
      position_ms: item.startMs
    })
  });

  if (response.status === 204) {
    setStatus(
      "Playing:\n" +
      item.name + "\n" +
      item.song + " - " + item.artist + "\n" +
      "Start time: " + formatTime(item.startMs)
    );
    return;
  }

  const text = await response.text();

  if (response.status === 404 && text.includes("NO_ACTIVE_DEVICE")) {
    throw new Error(
      "No active Spotify device found.\n\n" +
      "Open Spotify, play any song for a second, pause it, then try again."
    );
  }

  if (response.status === 401) {
    throw new Error("Spotify login expired. Click Login to Spotify again.");
  }

  throw new Error("Play failed. HTTP " + response.status + ":\n" + text);
}

async function playWalkup(index) {
  const token = getToken();

  if (!token) {
    setStatus("Not logged in. Click Login to Spotify first.");
    return;
  }

  const item = walkupSongs[index];

  try {
    const trackId = await searchSpotifyTrack(item);
    await playSpotifyTrack(trackId, item);
  } catch (error) {
    setStatus(error.message);
  }
}

async function pauseSpotify() {
  const token = getToken();

  if (!token) {
    setStatus("Not logged in.");
    return;
  }

  const response = await fetch("https://api.spotify.com/v1/me/player/pause", {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (response.status === 204) {
    setStatus("Paused.");
    return;
  }

  const text = await response.text();

  if (response.status === 403 && text.includes("Restriction violated")) {
    setStatus("Spotify would not pause this track/device, but playback control is working.");
    return;
  }

  if (response.status === 404 && text.includes("NO_ACTIVE_DEVICE")) {
    setStatus(
      "No active Spotify device found.\n\n" +
      "Open Spotify, play any song for a second, pause it, then try again."
    );
    return;
  }

  if (response.status === 401) {
    setStatus("Spotify login expired. Click Login to Spotify again.");
    return;
  }

  setStatus("Pause failed. HTTP " + response.status + ":\n" + text);
}

function clearCachedTracks() {
  walkupSongs.forEach(item => {
    localStorage.removeItem(getCacheKey(item));
  });

  setStatus("Cached Spotify track matches cleared. The next button press will search again.");
}

renderButtons();
handleCallback();
</script>
